<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0a0a0f"/>
  <!-- Central node -->
  <rect x="340" y="160" width="120" height="80" rx="4" fill="none" stroke="#2a4a6b" stroke-width="2"/>
  <text x="400" y="205" font-family="monospace" font-size="11" fill="#f5f3ee" text-anchor="middle">Platform</text>
  <!-- Left nodes -->
  <rect x="100" y="60" width="100" height="50" rx="4" fill="none" stroke="#b8470b" stroke-width="1.5"/>
  <text x="150" y="90" font-family="monospace" font-size="9" fill="#6b6558" text-anchor="middle">Patients</text>
  <rect x="100" y="170" width="100" height="50" rx="4" fill="none" stroke="#b8470b" stroke-width="1.5"/>
  <text x="150" y="200" font-family="monospace" font-size="9" fill="#6b6558" text-anchor="middle">Providers</text>
  <rect x="100" y="280" width="100" height="50" rx="4" fill="none" stroke="#b8470b" stroke-width="1.5"/>
  <text x="150" y="310" font-family="monospace" font-size="9" fill="#6b6558" text-anchor="middle">Admin</text>
  <!-- Right nodes -->
  <rect x="600" y="60" width="100" height="50" rx="4" fill="none" stroke="#2a4a6b" stroke-width="1.5"/>
  <text x="650" y="90" font-family="monospace" font-size="9" fill="#6b6558" text-anchor="middle">AI Engine</text>
  <rect x="600" y="170" width="100" height="50" rx="4" fill="none" stroke="#2a4a6b" stroke-width="1.5"/>
  <text x="650" y="200" font-family="monospace" font-size="9" fill="#6b6558" text-anchor="middle">Scheduling</text>
  <rect x="600" y="280" width="100" height="50" rx="4" fill="none" stroke="#2a4a6b" stroke-width="1.5"/>
  <text x="650" y="310" font-family="monospace" font-size="9" fill="#6b6558" text-anchor="middle">Agents</text>
  <!-- Connection lines -->
  <line x1="200" y1="85" x2="340" y2="185" stroke="#2a4a6b" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="195" x2="340" y2="200" stroke="#2a4a6b" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="305" x2="340" y2="215" stroke="#2a4a6b" stroke-width="1" opacity="0.4"/>
  <line x1="460" y1="185" x2="600" y2="85" stroke="#b8470b" stroke-width="1" opacity="0.4"/>
  <line x1="460" y1="200" x2="600" y2="195" stroke="#b8470b" stroke-width="1" opacity="0.4"/>
  <line x1="460" y1="215" x2="600" y2="305" stroke="#b8470b" stroke-width="1" opacity="0.4"/>
</svg>
